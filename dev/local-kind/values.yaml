### Minimal Helm values for local kind bring-up.
### Adapted from dev/demo-master/values.yaml: only the kubermatic + kubermaticIssuer
### dex clients (no monitoring/MLA clients yet), local nip.io domain, and nginx
### configured the way kind's own ingress guide recommends (hostNetwork + hostPort
### on the "ingress-ready" node instead of a LoadBalancer service, since kind has
### no cloud load balancer).
###
### replicaCount/resources overrides below are DEMO ONLY sizing for a single-node
### kind cluster -- not prod grade. Chart defaults for this KKP version are
### nginx=3 replicas, dex=2 replicas; cert-manager/its webhook/cainjector already
### default to 1 replica each, so only their resource requests are trimmed here
### (cpu values match the proven-safe convention already used for the real
### kubeone-based envs in dev/values.yaml).

nginx:
  controller:
    kind: Deployment
    replicaCount: 1
    hostNetwork: true
    hostPort:
      enabled: true
    dnsPolicy: ClusterFirstWithHostNet
    nodeSelector:
      ingress-ready: "true"
    service:
      type: ClusterIP
      # External access bypasses this Service entirely (hostNetwork+hostPort
      # binds the pod directly to the node), so repurposing the Service's own
      # port numbers to match our public :8080/:8443 is safe -- it only
      # affects in-cluster DNS-based callers (see CoreDNS rewrite rule),
      # letting __KKP_DOMAIN__:8443 resolve correctly for both.
      ports:
        http: 8080
        https: 8443
    admissionWebhooks:
      enabled: false
    config:
      hsts: false
    resources:
      requests:
        cpu: 20m
        memory: 64Mi

cert-manager:
  resources:
    requests:
      cpu: 10m
  webhook:
    resources:
      requests:
        cpu: 10m

dex:
  replicaCount: 1
  resources:
    requests:
      cpu: 20m
  config:
    # :8443 because rootless podman can't publish the standard 443 host port
    # (see kind-install/cluster-nodeport.yaml)
    issuer: "https://__KKP_DOMAIN__:8443/dex"
    staticClients:
      - id: kubermatic
        name: Kubermatic
        secret: VNfJgZlth5fJ3BpSd5QSKGwBdKeFAkGk
        RedirectURIs:
        - https://__KKP_DOMAIN__:8443
        - https://__KKP_DOMAIN__:8443/projects

      - id: kubermaticIssuer
        name: Kubermatic OIDC Issuer
        secret: IcT66lr0DT1BGD8zGXICL2azgnZ57VTd
        RedirectURIs:
          - https://__KKP_DOMAIN__:8443/api/v1/kubeconfig
          - https://__KKP_DOMAIN__:8443/api/v2/kubeconfig/secret
          - https://__KKP_DOMAIN__:8443/api/v2/dashboard/login

      # IAP (oauth2-proxy) clients for the seed-level MLA dashboards. Same
      # demo secrets dev/demo-master/values.yaml uses -- this is a throwaway
      # local test cluster, not a real security boundary.
      - id: alertmanager
        name: AlertManager
        secret: 31XJHoWbktTYBbCIHchCeAaJtepPPS1W
        RedirectURIs:
        - https://alertmanager.__KKP_DOMAIN__:8443/oauth/callback
      - id: grafana
        name: Grafana
        secret: noBMZ3jhWbKlep2Op9jDfDWg1DMgydCX
        RedirectURIs:
        - https://grafana.__KKP_DOMAIN__:8443/oauth/callback
      - id: prometheus
        name: Prometheus
        secret: UXsiBXUnkpm8Xg1jQu1OYTBpfuazMC7X
        RedirectURIs:
        - https://prometheus.__KKP_DOMAIN__:8443/oauth/callback
      # IAP clients for the user-cluster MLA dashboards (userMla.iapMla).
      - id: grafana_user_self
        name: Grafana for Self User clusters
        secret: xK7EjZM2gmp3DRrl0APlMkNDcS1hEf7m
        RedirectURIs:
        - https://grafana-user.__KKP_DOMAIN__:8443/oauth/callback
      - id: alertmanager_user_self
        name: AlertManager for Self User clusters
        secret: LBZSAXMklV6Z1OWqHF2Fphgale1zY4TP
        RedirectURIs:
        - https://alertmanager-user.__KKP_DOMAIN__:8443/oauth/callback

    enablePasswordDB: true
    staticPasswords:
    - email: vijay@kubermatic.com
      # bcrypt hash of the string "password"
      hash: "$2b$10$bdy3m5CmqsDFy8iBPvJSGe4p5I.L3UuMpmCnEZ3WjhiXRaz8VWNSi"
      username: admin
      userID: 08a8684b-db88-4b73-90a9-3cd1661f5466
  ingress:
    host:
    enabled: true
    hosts:
      - host: __KKP_DOMAIN__
        paths:
          - path: /dex
            pathType: ImplementationSpecific
    tls:
      - secretName: dex-tls
        hosts:
          - __KKP_DOMAIN__
    annotations:
      # ca-issuer (dev/local-kind/ca-issuer.yaml), not selfsigned-issuer:
      # IAP's oauth2-proxy needs to trust dex's cert, which requires a real
      # CA (CA:TRUE) trust anchor -- a plain selfSigned-issuer leaf cert
      # (CA:FALSE) fails x509 verification even though issuer == subject.
      cert-manager.io/cluster-issuer: ca-issuer

### Everything below is newly ArgoCD-managed monitoring/logging/backup/storage
### for a fully-functional seed, kept to the same "DEMO ONLY, not PROD GRADE"
### minimal-resource convention as dev/values.yaml (which the real kubeone-based
### envs use) -- sizing here is trimmed further for a single-node kind cluster.

#monitoring -- replicas trimmed to 1 for the single-node kind cluster (chart
# defaults are prometheus=2, alertmanager=3, which can't all schedule/fit on
# one node and end up Pending).
prometheus:
  replicas: 1
  containers:
    prometheus:
      resources:
        requests:
          cpu: 50m

alertmanager:
  replicaCount: 1
  persistence:
    size: 1Gi
  resources:
    alertmanager:
      requests:
        cpu: 10m

grafana:
  provisioning:
    datasources:
      prometheusServices:
        - prometheus
      lokiServices:
        - loki
    configuration:
      auto_assign_org_role: Editor

kubeStateMetrics:
  resources:
    requests:
      cpu: 10m

nodeExporter:
  resources:
    requests:
      cpu: 10m

blackboxExporter:
  containers:
    blackboxExporter:
      resources:
        requests:
          cpu: 10m

#logging
alloy:
  controller:
    podLabels:
      env: local-kind
    # kind nodes don't run a persistent systemd-journald under /var/log/journal,
    # so loki.source.journal fails to open it and the alloy container crashloops.
    initContainers:
      - name: ensure-journal-dir
        image: busybox:1.36
        command: ["sh", "-c", "mkdir -p /var/log/journal"]
        volumeMounts:
          - name: varlog
            mountPath: /var/log

loki:
  persistence:
    size: '2Gi'
  resources:
    requests:
      cpu: 20m

#backup -- bucket name/credentials must match the minio block below (and the
# minio chart's own bucket-creation Job, which only creates
# velero-backup-{{ .Values.environment }} when velero.enable is true).
velero:
  backupsEnabled: true
  snapshotsEnabled: false
  deployNodeAgent: false
  initContainers:
   - name: velero-plugin-for-aws
     image: docker.io/velero/velero-plugin-for-aws:v1.10.0
     imagePullPolicy: IfNotPresent
     volumeMounts:
       - mountPath: /target
         name: plugins
  credentials:
    name: minio
    secretContents:
      credentials: |
        [default]
        aws_access_key_id='WxmjsBt0'
        aws_secret_access_key='ahxFbwh2JUTrlpE6hyHtKRnlJtkOgwIg'
  configuration:
    backupStorageLocation:
      - provider: aws
        bucket: velero-backup-local-kind
        default: true
        credential:
          name: minio
          key: credentials
        config:
          region: minio
          s3ForcePathStyle: 'true'
          s3Url: http://minio.minio.svc.cluster.local:9000
  resources:
    requests:
      cpu: 10m

# storage -- storageClass "kubermatic-fast" is created by installKKP()'s
# `--storageclass copy-default` flag (copies the cluster's default SC under
# this KKP-conventional name), same as dev/demo-master/values.yaml relies on.
minio:
  storageClass: kubermatic-fast
  credentials:
    accessKey: '9XLR0TfxQYVnyIAYamS6dcWOKpbgjYOi'
    secretKey: 'nkW9P6vG2bWfVcXG2BYhdcvlZSEWsYYDtPKKrbkxctgGjdId369u9OxOnoLMJNNW'
  resources:
    minio:
      requests:
        cpu: 10m

# IAP (oauth2-proxy) fronting the seed-level MLA dashboards. customProviderCA
# points at a Secret this repo's run-local-kind.sh creates
# (createIapTrustedCaSecret()) by copying the local-kind root CA's cert
# (dev/local-kind/ca-issuer.yaml, secret local-kind-ca-secret in the
# cert-manager namespace) -- dex's own ingress cert is issued by that CA
# (see the `ca-issuer` annotation on dex's ingress below), so oauth2-proxy
# trusts it when it calls out to the OIDC issuer. A plain selfSigned-issuer
# leaf cert would NOT work here even though issuer == subject: it has Basic
# Constraints CA:FALSE, which Go's crypto/x509 verifier refuses to treat as
# a trust anchor.
iap:
  oidc_issuer_url: https://__KKP_DOMAIN__:8443/dex
  customProviderCA:
    secretName: selfsigned-ca-cert
    secretKey: ca.crt
  deployments:
    alertmanager:
      name: alertmanager
      client_id: alertmanager
      client_secret: 31XJHoWbktTYBbCIHchCeAaJtepPPS1W
      encryption_key: UADeR15wrVNEfqkhT8kIARNOA4Iy10un
      config:
        approval_prompt: none
        scope: "groups openid email"
        email_domains:
          - '*'
        skip_auth_regex:
          - '/-/healthy'
      upstream_service: alertmanager.monitoring.svc.cluster.local
      upstream_port: 9093
      ingress:
        host: "alertmanager.__KKP_DOMAIN__"
        tls:
          - secretName: alertmanager-iap-tls
            hosts:
              - "alertmanager.__KKP_DOMAIN__"
        annotations:
          cert-manager.io/cluster-issuer: selfsigned-issuer
    grafana:
      name: grafana
      client_id: grafana
      client_secret: noBMZ3jhWbKlep2Op9jDfDWg1DMgydCX
      encryption_key: 48wG5FXnPFrfMbWgFRrZ70LqlYHn3vu0
      config:
        approval_prompt: none
        scope: "groups openid email"
        email_domains:
          - '*'
        skip_auth_regex:
          - '/api/health'
        pass_user_headers: true
      upstream_service: grafana.monitoring.svc.cluster.local
      upstream_port: 3000
      ingress:
        host: "grafana.__KKP_DOMAIN__"
        tls:
          - secretName: grafana-iap-tls
            hosts:
              - "grafana.__KKP_DOMAIN__"
        annotations:
          cert-manager.io/cluster-issuer: selfsigned-issuer
    prometheus:
      name: prometheus
      client_id: prometheus
      client_secret: UXsiBXUnkpm8Xg1jQu1OYTBpfuazMC7X
      encryption_key: 7jvKLRPcdnyAGadt9oKYvixpP3JhhrG2
      config:
        approval_prompt: none
        scope: "groups openid email"
        email_domains:
          - '*'
        skip_auth_regex:
          - '/-/healthy'
      upstream_service: prometheus.monitoring.svc.cluster.local
      upstream_port: 9090
      ingress:
        host: "prometheus.__KKP_DOMAIN__"
        tls:
          - secretName: prometheus-iap-tls
            hosts:
              - "prometheus.__KKP_DOMAIN__"
        annotations:
          cert-manager.io/cluster-issuer: selfsigned-issuer
