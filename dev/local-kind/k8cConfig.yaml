### Minimal KubermaticConfiguration for a local kind cluster (master == seed).
### Adapted from dev/demo-master/k8cConfig.yaml: local domain (nip.io, resolves to
### 127.0.0.1 with no DNS setup needed) + selfsigned cert-manager issuer (no ACME).

apiVersion: kubermatic.k8c.io/v1
kind: KubermaticConfiguration
metadata:
  name: kubermatic
  namespace: kubermatic
spec:
  # insert the Docker authentication JSON provided by Kubermatic here
  imagePullSecret: |
    {
        "auths": {
            "quay.io/kubermatic": {
                "auth": "a3ViZXJtYXRpYytkZXZfa3ViZXJtYXRpY19pbzpIMzhWRkJWMTFRMDNNNFFDRzJUMkMwQTlOS0RPUk5NUk5QM0RLT0o0RjBQQ05CNU02WDhEQ0FNNzNBWU5OTVda",
                "email": ""
            },
            "quay.io/dharapvj": {
                "auth": "ZGhhcmFwdmorZGhhcmFwdmpfazhzOlRXR0tEMEdWRVRGRkdVNjlZWjVERDFVTjJDUkJDSUVSOExBVVAzMURGRkI1MkUzTkJZTkVYTlM1NVRLSjdJWVI="
            }
        }
    }
  ingress:
    # __KKP_DOMAIN__ is templated at runtime by run-local-kind.sh into
    # kkp.<wsl-ip>.nip.io -- a public DNS wildcard that resolves to whatever
    # IP is embedded in it. Using the WSL VM's own IP instead of 127.0.0.1
    # because Windows -> WSL2 localhost-forwarding doesn't work on this
    # machine (likely blocked by managed-network security software), while
    # the WSL VM's IP is directly reachable from Windows.
    domain: __KKP_DOMAIN__
    certificateIssuer:
      apiGroup: null
      kind: ClusterIssuer
      # ca-issuer (dev/local-kind/ca-issuer.yaml), not selfsigned-issuer: this
      # ingress shares its host (__KKP_DOMAIN__) with dex's own ingress
      # (different path, same host) -- nginx serves exactly one TLS cert per
      # hostname regardless of path, so both ingresses for this host must use
      # the same CA-backed issuer or IAP's oauth2-proxy ends up validating
      # dex's OIDC endpoint against whichever of the two certs nginx happens
      # to pick, which may not be dex-tls at all.
      name: "ca-issuer"
    className: nginx

  featureGates:
    OIDCKubeCfgEndpoint: true
    OpenIDAuthPlugin: true

  auth:
    clientID: kubermatic
    issuerClientID: kubermaticIssuer
    # self-signed cert -- Kubermatic can't validate it against a public CA
    skipTokenIssuerTLSVerify: true
    # :8443 because rootless podman can't publish the standard 443 host port
    # (see kind-install/cluster-nodeport.yaml)
    tokenIssuer: https://__KKP_DOMAIN__:8443/dex

    issuerClientSecret: IcT66lr0DT1BGD8zGXICL2azgnZ57VTd
    issuerCookieKey: eL3DduBf10VeBM3bAwmfA6qIGvmTWXz4
    serviceAccountKey: lvURnM9KNg2ylBI7tA2SiKNhLcbuuzvg

  applications:
    # keep this off for the first bring-up -- the default catalog is heavy
    # and not needed to get a master+seed running.
    defaultApplicationCatalog:
      enable: false

# DEMO ONLY resource allocation. Not PROD GRADE!
  api:
    resources:
      requests:
        cpu: 100m
  masterController:
    resources:
      requests:
        cpu: 20m
  ui:
    resources:
      requests:
        cpu: 100m
